<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X</title>
    <style>
        :root {
            --cooldown-time: 5s;
        }

        /* 讓 Body 徹底填滿螢幕，不留白邊 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止滾動 */
            background-color: #000;
        }

        /* 圖片容器：強制佔滿手機全螢幕 */
        .image-wrapper {
            position: relative;
            width: 100vw;  /* 視窗寬度 100% */
            height: 100vh; /* 視窗高度 100% */
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* 禁用狀態 */
        .image-wrapper.disabled {
            pointer-events: none;
        }

        /* 圖片處理：上下拉長至滿版，左右自動裁切 */
        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            /* 關鍵屬性：保持比例填滿，左右多出的部分會被隱藏 */
            object-fit: cover; 
            
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
        }

        .image-wrapper img.active {
            opacity: 1;
        }

        /* 按下後的彈跳動畫：改為稍微縮小整體視野 */
        @keyframes tap-bounce {
            0% { transform: scale(1); }
            30% { transform: scale(0.96); } /* 稍微內縮，增加層次感 */
            100% { transform: scale(1); }
        }

        .image-wrapper.tapped {
            animation: tap-bounce 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

    </style>
</head>
<body>

    <div class="image-wrapper" id="interactionTarget">
        <img id="img1" src="../img_0/aid1.png" class="active">
        <img id="img2" src="../img_0/aid2.png">
        <img id="img3" src="../img_0/aid3.png">
        <img id="img4" src="../img_0/aid4.png">
        
        <audio id="bgm" src="../img_0/ex-aid.mp3" preload="auto"></audio>
    </div>

    <script>
        const wrapper = document.getElementById('interactionTarget');
        const audio = document.getElementById('bgm');
        const images = [
            document.getElementById('img1'),
            document.getElementById('img2'),
            document.getElementById('img3'),
            document.getElementById('img4')
        ];

        wrapper.addEventListener('click', startSequence);

        function startSequence() {
            if (wrapper.classList.contains('disabled')) return;

            // 觸發縮放視覺回饋
            wrapper.classList.add('tapped');
            setTimeout(() => wrapper.classList.remove('tapped'), 400);

            wrapper.classList.add('disabled');
            audio.play().catch(e => console.log("Audio play blocked"));

            const startTime = 100; 
            const changeInterval = 1500; 

            images.forEach((img, index) => {
                setTimeout(() => {
                    images.forEach(i => i.classList.remove('active'));
                    img.classList.add('active');
                }, startTime + (index * changeInterval));
            });

            // 5秒後恢復可點擊
            setTimeout(() => {
                wrapper.classList.remove('disabled');
            }, 5000);
        }
    </script>

</body>
</html>

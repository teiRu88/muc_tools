<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黃金價值即時換算器</title>
    <style>
        :root {
            --bg-color: #F2F0EB;
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A;
            --text-sub: #8E8E8E;
            --accent-gold: #C5A059;
            --border-color: #D1CEC7;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        h2 {
            text-align: center;
            font-weight: 500;
            margin-bottom: 25px;
            color: var(--accent-gold);
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-sub);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #FAFAFA;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-gold);
            background-color: #FFF;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 25px 0;
            position: relative;
        }

        .divider::after {
            content: "換算結果";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--card-bg);
            padding: 0 15px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .result-box {
            background-color: #F9F8F6;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-gold);
        }

        .result-unit {
            font-size: 0.9rem;
            margin-left: 5px;
            color: var(--text-main);
        }

        .note {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #A0A0A0;
            line-height: 1.5;
            text-align: justify;
        }

        /* 手機版優化 */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>黃金現貨換算器</h2>

    <div class="input-group">
        <label>美金匯率 (USD/TWD)</label>
        <input type="number" id="fxRate" value="31.50" step="0.01" placeholder="例如 32.5">
    </div>

    <div class="input-group">
        <label>國際金價 (USD / 盎司)</label>
        <input type="number" id="goldOz" value="5300" step="1" placeholder="例如 5300">
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>台灣金價 (TWD / 台錢)</label>
        <input type="number" id="goldTael" step="1" placeholder="輸入台錢價格反算">
    </div>

    <div class="result-box">
        <div id="displayResult">
            <span class="result-value" id="calcValue">0</span>
            <span class="result-unit" id="calcUnit">TWD / 台錢</span>
        </div>
    </div>

    <div class="note">
        * 注意事項：本計算機採用理論物理換算（1 盎司 = 8.294 台錢）。實際交易時，台銀 AU9901 或實體銀樓價格可能含有 0.3% - 1% 不等之溢價或處理費，實際價格請以各交易平台掛牌為準。</p>
	計算公式：</br>
	(盎司國際金價÷8.294)×美金兌台幣匯率＝1 台錢台幣價
	
    </div>
</div>

<script>
    const fxRateInput = document.getElementById('fxRate');
    const goldOzInput = document.getElementById('goldOz');
    const goldTaelInput = document.getElementById('goldTael');
    const calcValue = document.getElementById('calcValue');

    // 換算常數：1 盎司 = 0.8294 台兩 = 8.294 台錢
    const OZ_TO_TAEL = 8.294;

    function updateFromOz() {
        const usd = parseFloat(goldOzInput.value);
        const fx = parseFloat(fxRateInput.value);

        if (usd && fx) {
            const twdPerTael = (usd / OZ_TO_TAEL) * fx;
            goldTaelInput.value = Math.round(twdPerTael);
            calcValue.innerText = Math.round(twdPerTael).toLocaleString();
        }
    }

    function updateFromTael() {
        const twd = parseFloat(goldTaelInput.value);
        const fx = parseFloat(fxRateInput.value);

        if (twd && fx) {
            const usdPerOz = (twd * OZ_TO_TAEL) / fx;
            goldOzInput.value = Math.round(usdPerOz);
            calcValue.innerText = Math.round(usdPerOz).toLocaleString();
        }
    }

    // 即時輸入監聽
    fxRateInput.addEventListener('input', updateFromOz);
    goldOzInput.addEventListener('input', updateFromOz);
    goldTaelInput.addEventListener('input', updateFromTael);

    // 初始化計算一次
    updateFromOz();
</script>

</body>
</html>
